<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>421 MASTER - PRO DESIGN</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0b0b">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0b0b0b; --panel: #1a1a1a; --accent: #e67e22; 
            --gold: #ffca28; --wood: #4e342e; --win: #2ecc71; 
            --loss: #e74c3c; --rembet: #9b59b6; --led-off: #333;
        }
        
        html, body { 
            overscroll-behavior-y: contain; position: fixed; overflow: hidden; 
            width: 100%; height: 100%; -webkit-tap-highlight-color: transparent; 
            touch-action: none; user-select: none; background: var(--bg);
            color: #eee; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        #start-menu { 
            background: var(--panel); padding: 30px; border-radius: 20px; 
            border: 4px solid var(--wood); text-align: center; 
            width: 88%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); z-index: 100; 
        }
        
        input { padding: 15px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; width: 85%; margin: 10px 0; text-align: center; font-size: 1.2em; }

        .game-container { 
            display: none; flex-direction: column; justify-content: space-between; 
            background: var(--panel); padding: 10px; border-radius: 0; 
            position: relative; width: 100%; height: 100vh; 
            max-width: 600px; box-shadow: 0 0 50px rgba(0,0,0,1); 
        }

        /* DASHBOARD DYNAMIQUE */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 40px;
            padding: 5px;
        }

        .dash-item {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .dash-label { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .dash-val { font-size: 1.4em; font-weight: 900; }

        /* SYSTEME DE LED POUR LES COUPS */
        .led-container { display: flex; gap: 8px; margin-top: 5px; }
        .led { width: 12px; height: 12px; border-radius: 50%; background: var(--led-off); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); transition: all 0.3s; }
        .led.active { background: var(--win); box-shadow: 0 0 10px var(--win); }

        .p-area { display: flex; justify-content: space-around; gap: 8px; margin-bottom: 5px; }
        .p-box { flex: 1; padding: 10px; border-radius: 15px; border: 2px solid #333; background: #1a1a1a; transition: all 0.3s; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .active { border-color: var(--win); background: #142814; transform: scale(1.02); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        
        .mini-dice-container { display: flex; gap: 4px; height: 30px; align-items: center; margin-bottom: 3px; }
        .p-chips { font-size: 1.8em; color: var(--gold); font-weight: 900; text-shadow: 0 0 10px rgba(255, 202, 40, 0.3); }

        canvas { 
            background: radial-gradient(circle, #2d5a27 0%, #132b12 100%); 
            border-top: 4px solid var(--wood); border-bottom: 4px solid var(--wood);
            width: 100%; height: auto; touch-action: none; flex-grow: 1;
        }
        
        .btn-group { display: flex; justify-content: center; gap: 15px; padding: 20px 10px 40px 10px; background: #000; }
        button { padding: 22px; font-size: 1.3em; cursor: pointer; background: var(--accent); border: none; color: white; border-radius: 18px; font-weight: bold; box-shadow: 0 6px 0 #a04a00; flex: 1; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #a04a00; }
        button:disabled { opacity: 0.1; filter: grayscale(1); }

        #btn-menu-top { position: absolute; top: 10px; right: 10px; background: #333; padding: 8px 15px; font-size: 0.8em; width: auto; box-shadow: none; z-index: 400; border-radius: 10px; }

        #round-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.95); border: 4px solid var(--gold); 
            color: var(--gold); padding: 30px; border-radius: 20px; 
            font-size: 1.8em; font-weight: bold; display: none; 
            z-index: 200; text-align: center; width: 80%; pointer-events: none; 
        }

        #end-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center;
        }
    </style>
</head>
<body>

    <h2 id="title-main" style="color:var(--gold); letter-spacing: 3px; text-shadow: 3px 3px #000; margin-bottom: 20px;">🎲 421 MASTER</h2>

    <div id="start-menu">
        <input type="text" id="player-name" placeholder="Ton Pseudo" maxlength="10">
        <button onclick="startApp('host')" style="background:var(--rembet); box-shadow:0 4px 0 #6c3483; width:100%; margin-bottom:15px;">CRÉER SALON</button>
        <input type="text" id="join-id" placeholder="Code Adversaire">
        <button onclick="startApp('join')" style="background:var(--win); box-shadow:0 4px 0 #1e8449; width:100%">REJOINDRE</button>
        <div id="online-waiting" style="display:none; margin-top:20px;"><p>Code salon : <br><b id="my-code" style="color:var(--gold); cursor:pointer; font-size: 1.5em;" onclick="copyID()">...</b></p></div>
    </div>

    <div class="game-container" id="game-ui">
        <button id="btn-menu-top" onclick="hardReset()">MENU</button>
        <div id="round-overlay"></div>
        
        <div id="end-screen">
            <h1 id="end-status" style="font-size: 3.5em; margin-bottom: 10px;"></h1>
            <p id="end-msg" style="margin-bottom: 30px; font-size: 1.2em;"></p>
            <button onclick="requestRevenge()" style="background:var(--win); width: 80%; margin-bottom: 15px;">REVANCHE</button>
            <button onclick="hardReset()" style="background:#444; width: 80%;">ACCUEIL</button>
        </div>

        <div class="dashboard">
            <div class="dash-item">
                <span class="dash-label">Phase</span>
                <span id="phase-label" class="dash-val" style="color:var(--accent)">TIRAGE</span>
            </div>
            <div class="dash-item" style="border-color: var(--gold);">
                <span class="dash-label">Pot</span>
                <span id="pot" class="dash-val" style="color:var(--gold); font-size: 2em;">21</span>
            </div>
            <div class="dash-item">
                <span class="dash-label">Coups</span>
                <div class="led-container">
                    <div id="led1" class="led"></div>
                    <div id="led2" class="led"></div>
                    <div id="led3" class="led"></div>
                </div>
            </div>
        </div>

        <div class="p-area">
            <div id="p0-ui" class="p-box"><div id="dice-p0" class="mini-dice-container"></div><div id="info-p0" class="combo-text"></div><div class="p-name" id="p0-label">Hôte</div><div class="p-chips" id="p0-chips">0</div></div>
            <div id="p1-ui" class="p-box"><div id="dice-p1" class="mini-dice-container"></div><div id="info-p1" class="combo-text"></div><div class="p-name" id="p1-label">Invité</div><div class="p-chips" id="p1-chips">0</div></div>
        </div>

        <canvas id="gameCanvas" width="500" height="250"></canvas>

        <div class="btn-group">
            <button id="rollBtn">LANCER</button>
            <button id="stopBtn" style="background: #444; box-shadow: 0 6px 0 #222;">STOP</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), overlay = document.getElementById('round-overlay');
    let peer, conn, myPlayerIdx = -1, gameOver = false, isPaused = false, wakeLock = null;

    const sounds = {
        roll: new Audio('dice.wav'),
        clink: new Audio('clink.mp3'),
        win: new Audio('victory.mp3'),
        loss: new Audio('loss.mp3')
    };

    function playSfx(name) {
        try {
            const s = sounds[name];
            if (s) { s.pause(); s.currentTime = 0; s.play().catch(e => {}); }
        } catch(e) {}
    }

    let game = {
        phase: "TIRAGE", pot: 21,
        players: [{name: "Hôte", chips: 0, comboDice: [], comboName: "", tirage: 0}, {name: "Invité", chips: 0, comboDice: [], comboName: "", tirage: 0}],
        activeP: 0, rollsDone: 0, rollsMax: 3, firstInPli: -1,
        dice: [0,0,0], kept: [false, false, false], isRolling: false
    };

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
    }

    function saveState() {
        localStorage.setItem('421_game', JSON.stringify(game));
        localStorage.setItem('421_myIdx', myPlayerIdx);
        if(peer) localStorage.setItem('421_lastPeerID', peer.id);
        if(conn) localStorage.setItem('421_lastTargetID', conn.peer);
    }

    function loadState() {
        const saved = localStorage.getItem('421_game');
        if(saved) {
            game = JSON.parse(saved);
            myPlayerIdx = parseInt(localStorage.getItem('421_myIdx'));
            return true;
        }
        return false;
    }

    function hardReset() { localStorage.clear(); location.reload(); }

    function startApp(mode) {
        document.getElementById('title-main').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        requestWakeLock();
        if(mode === 'host') initOnline(); else joinOnline();
    }

    function analyze(dice) {
        if (!dice || dice[0] === 0) return { rank: -1, pts: 0, dice: [], name: "" };
        const dSort = [...dice].sort((a,b) => b-a), s = dSort.join('');
        let res = { dice: [...dice], pts: 1, rank: parseInt(s), name: dice.join('-') + " (1 PT)" };
        if (s === "421") res = { ...res, rank: 1000000, pts: 10, name: "4-2-1 (10 PTS)" };
        else if (s === "111") res = { ...res, rank: 950000, pts: 7, name: "3 AS (7 PTS)" };
        else if (dSort.filter(v => v === 1).length === 2) { 
            let a = dSort.find(v => v !== 1) || 1; 
            res = { ...res, rank: 800000 + (a*1000), pts: a, name: `2 AS-${a} (${a} PTS)` };
        } else if (dSort[0] === dSort[1] && dSort[1] === dSort[2]) res = { ...res, rank: 700000 + (dSort[0]*1000), pts: dSort[0], name: `BRELAN ${dSort[0]} (${dSort[0]} PTS)` };
        else if (s === "221") res = { ...res, rank: 0, pts: 2, name: "NÉNETTE (2 PTS)" };
        else if (["654","543","432","321"].includes(s)) res = { ...res, rank: 600000 + parseInt(s), pts: (s==="321"?1:2), name: `SUITE (${dSort.join('-')})` };
        return res;
    }

    function updateUI() {
        if(game.phase === "DECHARGE" && !gameOver) {
            if(game.players[0].chips === 0) triggerEnd(0);
            else if(game.players[1].chips === 0) triggerEnd(1);
        }

        // MISE A JOUR DES LEDS
        for(let i=1; i<=3; i++) {
            const led = document.getElementById(`led${i}`);
            led.className = (i <= (game.rollsMax - game.rollsDone)) ? "led active" : "led";
        }

        document.getElementById('pot').innerText = game.pot;
        document.getElementById('phase-label').innerText = game.phase;
        document.getElementById('phase-label').style.color = (game.phase === "CHARGE") ? "var(--loss)" : (game.phase === "DECHARGE" ? "var(--win)" : "var(--accent)");

        for(let i=0; i<2; i++) {
            const p = game.players[i], dCont = document.getElementById(`dice-p${i}`), iCont = document.getElementById(`info-p${i}`);
            document.getElementById(`p${i}-label`).innerText = p.name;
            document.getElementById(`p${i}-chips`).innerText = p.chips;
            document.getElementById(`p${i}-ui`).className = (game.activeP === i && !gameOver) ? "p-box active" : "p-box";
            dCont.innerHTML = ""; iCont.innerText = "";
            if (game.phase === "TIRAGE") { if(p.tirage > 0) { dCont.appendChild(createMiniDie(p.tirage)); iCont.innerText = "DÉ : " + p.tirage; } }
            else {
                let isMe = (i === game.activeP && !isPaused && !game.isRolling);
                let curD = isMe ? game.dice : (p.comboDice || []);
                let curN = isMe ? (game.dice[0] !== 0 ? analyze(game.dice).name : "") : (p.comboName || "");
                if (curD && curD[0] !== 0) { curD.forEach(v => dCont.appendChild(createMiniDie(v))); iCont.innerText = curN; }
            }
        }
        const myTurn = (game.activeP === myPlayerIdx && !gameOver && !isPaused && !game.isRolling);
        document.getElementById('rollBtn').disabled = !myTurn;
        document.getElementById('stopBtn').disabled = !myTurn || game.rollsDone === 0 || game.phase === "TIRAGE";
        saveState();
    }

    function triggerEnd(winnerIdx) {
        gameOver = true;
        const endScreen = document.getElementById('end-screen');
        document.getElementById('end-status').innerText = (winnerIdx === myPlayerIdx) ? "VICTOIRE !" : "DÉFAITE...";
        document.getElementById('end-status').style.color = (winnerIdx === myPlayerIdx) ? "var(--win)" : "var(--loss)";
        document.getElementById('end-msg').innerText = (winnerIdx === myPlayerIdx) ? "Félicitations Champion !" : `Le gagnant est ${game.players[winnerIdx].name}`;
        endScreen.style.display = 'flex';
        playSfx(winnerIdx === myPlayerIdx ? 'win' : 'loss');
    }

    function requestRevenge() { sendData({type: 'REVENGE_REQ'}); showOverlay("Attente adversaire...", 2000); }

    function resetForRevenge() {
        game.phase = "TIRAGE"; game.pot = 21; gameOver = false;
        game.players.forEach(p => { p.chips = 0; p.tirage = 0; p.comboDice = []; p.comboName = ""; });
        game.activeP = 0; game.rollsDone = 0; game.rollsMax = 3; game.firstInPli = -1;
        game.dice = [0,0,0]; game.kept = [false, false, false];
        document.getElementById('end-screen').style.display = 'none';
        updateUI(); draw();
    }

    function draw() {
        ctx.clearRect(0,0,500,250);
        if (game.phase === "TIRAGE") { if (game.dice[0] > 0) drawDie(190, 65, 120, game.dice[0], false); }
        else { for(let i=0; i<3; i++) if(game.dice[i] > 0) drawDie(25 + i * 160, 65, 110, game.dice[i], game.kept[i]); }
    }

    function createMiniDie(val) {
        const die = document.createElement('div'); die.className = 'mini-die';
        const dots = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
        for(let i=0; i<9; i++) { const dot = document.createElement('div'); if(dots[val] && dots[val].includes(i)) dot.className = 'dot'; die.appendChild(dot); }
        return die;
    }

    function drawDie(x, y, size, val, isKept) {
        ctx.fillStyle = isKept ? "#222" : "#fff"; 
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 15; ctx.shadowOffsetY = 10;
        ctx.beginPath(); ctx.roundRect(x,y,size,size,20); ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        if(isKept) { ctx.strokeStyle = "var(--win)"; ctx.lineWidth = 6; ctx.stroke(); }
        ctx.fillStyle = isKept ? "var(--win)" : "#c0392b";
        const p = size/4, ptsMap = {1:[[2,2]], 2:[[1,1],[3,3]], 3:[[1,1],[2,2],[3,3]], 4:[[1,1],[1,3],[3,1],[3,3]], 5:[[1,1],[1,3],[2,2],[3,1],[3,3]], 6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]};
        if(ptsMap[val]) ptsMap[val].forEach(pt => { ctx.beginPath(); ctx.arc(x+pt[0]*p, y+pt[1]*p, size/12, 0, Math.PI*2); ctx.fill(); });
    }

    function roll() {
        if(gameOver || game.isRolling || isPaused || game.activeP !== myPlayerIdx) return;
        let final = (game.phase === "TIRAGE") ? [Math.floor(Math.random()*6)+1] : [0,0,0];
        if (game.phase !== "TIRAGE") { for(let i=0; i<3; i++) final[i] = (!game.kept[i] || game.dice[0] === 0) ? Math.floor(Math.random()*6)+1 : game.dice[i]; }
        playSfx('roll');
        sendData({type:'ANIM', kept: [...game.kept], final: final, senderIdx: myPlayerIdx}); 
        runAnim(final, myPlayerIdx);
    }

    function runAnim(finalValues, senderIdx) {
        game.isRolling = true; updateUI();
        let count = 0;
        let anim = setInterval(() => {
            if(game.phase === "TIRAGE") game.dice = [Math.floor(Math.random()*6)+1];
            else { for(let i=0; i<3; i++) if(!game.kept[i]) game.dice[i] = Math.floor(Math.random()*6)+1; }
            draw();
            if(++count > 12) { 
                clearInterval(anim); 
                game.dice = finalValues; 
                game.isRolling = false; 
                if(game.activeP === myPlayerIdx) handleRollResult(); 
                updateUI(); draw(); 
            }
        }, 50);
    }

    function handleRollResult() {
        if(game.phase === "TIRAGE") {
            game.players[game.activeP].tirage = game.dice[0]; game.dice = [0,0,0]; 
            if(game.players[0].tirage > 0 && game.players[1].tirage > 0) {
                isPaused = true; 
                const msg = `${game.players[0].name}: ${game.players[0].tirage} vs ${game.players[1].name}: ${game.players[1].tirage}`;
                sendData({type:'OVERLAY', msg: msg, duration: 3000}); showOverlay(msg, 3000);
                setTimeout(() => {
                    if(game.players[0].tirage === game.players[1].tirage) { 
                        game.players[0].tirage = 0; game.players[1].tirage = 0;
                        sendData({type:'OVERLAY', msg: "ÉGALITÉ !", duration: 2000}); showOverlay("ÉGALITÉ !", 2000); 
                    } else { 
                        game.activeP = (game.players[0].tirage < game.players[1].tirage) ? 0 : 1; 
                        game.phase = "CHARGE"; 
                        sendData({type:'OVERLAY', msg: `${game.players[game.activeP].name} JOUE !`, duration: 2500}); showOverlay(`${game.players[game.activeP].name} JOUE !`, 2500); 
                    }
                    isPaused = false; finishTurn();
                }, 3000);
            } else { game.activeP = (game.activeP === 0) ? 1 : 0; finishTurn(); }
        } else { 
            const s = [...game.dice].sort((a,b)=>b-a).join('');
            if(s === "221") {
                const pIdx = game.activeP, oppIdx = 1 - pIdx;
                let take = (game.phase === "CHARGE") ? Math.min(game.pot, 2) : Math.min(game.players[oppIdx].chips, 2);
                if(game.phase === "CHARGE") game.pot -= take; else game.players[oppIdx].chips -= take;
                game.players[pIdx].chips += take;
                playSfx('clink');
                sendData({type:'OVERLAY', msg: "NÉNETTE ! (+2)", duration: 2000, flash: true}); 
                showOverlay("NÉNETTE ! (+2)", 2000); triggerFlash();
            }
            game.rollsDone++; if(game.rollsDone === game.rollsMax) stop(); else finishTurn(); 
        }
    }

    function triggerFlash() { document.body.classList.add('nenette-flash'); setTimeout(() => document.body.classList.remove('nenette-flash'), 600); }

    function stop() {
        if(isPaused || game.isRolling || game.activeP !== myPlayerIdx || game.dice[0] === 0) return;
        const res = analyze(game.dice); 
        game.players[game.activeP].comboDice = [...res.dice]; game.players[game.activeP].comboName = res.name;
        if(game.firstInPli === -1) { 
            game.firstInPli = game.activeP; game.rollsMax = game.rollsDone; 
            game.activeP = (game.activeP === 0) ? 1 : 0; 
            game.rollsDone = 0; game.dice = [0, 0, 0]; game.kept = [false, false, false];
        } else resolvePli();
        finishTurn();
    }

    function resolvePli() {
        isPaused = true; const p0 = analyze(game.players[0].comboDice), p1 = analyze(game.players[1].comboDice);
        let winMsg = (p0.rank === p1.rank) ? "⚖️ REMBET !" : "";
        if(p0.rank !== p1.rank) {
            let wIdx = (p0.rank > p1.rank) ? 0 : 1, lIdx = 1 - wIdx, pts = (wIdx === 0 ? p0.pts : p1.pts);
            if(game.phase === "CHARGE") { let t = Math.min(game.pot, pts); game.players[lIdx].chips += t; game.pot -= t; winMsg = `${game.players[lIdx].name} +${t}`; if(game.pot <= 0) game.phase = "DECHARGE"; }
            else { let t = Math.min(game.players[wIdx].chips, pts); game.players[wIdx].chips -= t; game.players[lIdx].chips += t; winMsg = `${game.players[wIdx].name} ➔ ${t}`; }
            playSfx('clink'); game.activeP = lIdx;
        } else game.activeP = game.firstInPli;
        
        sendData({type:'OVERLAY', msg: winMsg, duration: 3000}); showOverlay(winMsg, 3000);
        setTimeout(() => {
            isPaused = false; game.firstInPli = -1; game.rollsMax = 3; game.rollsDone = 0; game.dice = [0, 0, 0]; game.kept = [false, false, false];
            game.players[0].comboDice = []; game.players[1].comboDice = []; 
            game.players[0].comboName = ""; game.players[1].comboName = "";
            finishTurn();
        }, 3000);
    }

    function initOnline() { 
        game.players[0].name = document.getElementById('player-name').value || "Hôte";
        peer = new Peer(localStorage.getItem('421_lastPeerID') || '421-' + Math.floor(Math.random()*9999));
        peer.on('open', id => { document.getElementById('my-code').innerText = id; document.getElementById('online-waiting').style.display = 'block'; saveState(); });
        peer.on('connection', c => { conn = c; myPlayerIdx = 0; setupSync(); });
    }

    function joinOnline() {
        game.players[1].name = document.getElementById('player-name').value || "Invité";
        peer = new Peer(); 
        peer.on('open', () => { conn = peer.connect(document.getElementById('join-id').value || localStorage.getItem('421_lastTargetID')); myPlayerIdx = 1; setupSync(); });
    }

    function setupSync() {
        conn.on('open', () => { sendData({type:'HELLO', name: game.players[myPlayerIdx].name, game: (myPlayerIdx === 0 ? game : null)}); document.getElementById('start-menu').style.display='none'; document.getElementById('game-ui').style.display='flex'; updateUI(); draw(); });
        conn.on('data', d => {
            if(d.type === 'HELLO') { game.players[myPlayerIdx===0?1:0].name = d.name; if(d.game && myPlayerIdx === 1) game = d.game; updateUI(); }
            if(d.type === 'SYNC') { game = d.game; updateUI(); draw(); }
            if(d.type === 'ANIM') { game.kept = d.kept; if(game.phase !== "TIRAGE" || d.senderIdx !== myPlayerIdx) runAnim(d.final, d.senderIdx); }
            if(d.type === 'OVERLAY') { showOverlay(d.msg, d.duration); if(d.flash) triggerFlash(); }
            if(d.type === 'REVENGE_REQ') { if(confirm("Revanche ?")) { resetForRevenge(); sendData({type: 'REVENGE_OK'}); } }
            if(d.type === 'REVENGE_OK') { resetForRevenge(); }
        });
    }

    function sendData(d) { if(conn && conn.open) conn.send(d); }
    function finishTurn() { sendData({type:'SYNC', game:game}); updateUI(); draw(); }
    function copyID() { navigator.clipboard.writeText(document.getElementById('my-code').innerText); alert("Code copié !"); }
    function showOverlay(txt, dur) { overlay.innerText = txt; overlay.style.display = 'block'; setTimeout(() => overlay.style.display = 'none', dur); }
    
    document.getElementById('rollBtn').addEventListener('click', roll);
    document.getElementById('stopBtn').addEventListener('click', stop);
    canvas.addEventListener('pointerdown', e => {
        if(game.isRolling || game.phase === "TIRAGE" || game.rollsDone === 0 || game.activeP !== myPlayerIdx) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (500 / r.width);
        for(let i=0; i<3; i++) if(x > 25+i*160 && x < 135+i*160) game.kept[i] = !game.kept[i];
        updateUI(); draw();
    });

    window.onload = () => { if(loadState()) { document.getElementById('player-name').value = game.players[myPlayerIdx].name; if(myPlayerIdx === 0) startApp('host'); else startApp('join'); } };
</script>
</body>

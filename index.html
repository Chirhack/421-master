<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>421 MASTER - V1.0.7</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0b0b">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0b0b0b; --panel: #1a1a1a; --accent: #e67e22; 
            --gold: #ffca28; --wood: #4e342e; --win: #2ecc71; 
            --loss: #e74c3c; --rembet: #9b59b6; --led-off: #333;
        }
        
        html, body { 
            overscroll-behavior-y: contain; position: fixed; overflow: hidden; 
            width: 100%; height: 100%; -webkit-tap-highlight-color: transparent; 
            touch-action: none; user-select: none; background: var(--bg);
            color: #eee; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* --- BARRE DE CHARGEMENT DORÉE --- */
        #update-loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 4px; 
            background: #222; z-index: 5000; 
        }
        #update-progress { 
            width: 0%; height: 100%; background: var(--gold); 
            box-shadow: 0 0 15px var(--gold); transition: width 0.4s ease; 
        }

        #version-tag {
            position: fixed; bottom: 5px; right: 10px; font-size: 0.6em;
            color: #444; pointer-events: none; z-index: 1000; letter-spacing: 1px;
        }

        /* --- FLASH ANIMATIONS --- */
        .nenette-flash { animation: flash-red 0.6s ease-out; }
        @keyframes flash-red { 0% { background: var(--bg); } 50% { background: #600; } 100% { background: var(--bg); } }
        
        .gold-flash { animation: flash-gold 0.8s ease-out; }
        @keyframes flash-gold { 0% { background: var(--bg); } 50% { background: #aa8800; box-shadow: inset 0 0 100px #ffca28; } 100% { background: var(--bg); } }
        
        #start-menu { 
            background: var(--panel); padding: 25px; border-radius: 20px; 
            border: 4px solid var(--wood); text-align: center; 
            width: 85%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); z-index: 100; 
        }
        
        input { padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; width: 85%; margin: 8px 0; text-align: center; font-size: 1.1em; }

        .game-container { 
            display: none; flex-direction: column; 
            background: var(--panel); position: relative; width: 100%; height: 100vh; 
            max-width: 600px; overflow: hidden;
        }

        .dashboard {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
            margin-top: 45px; padding: 10px; flex-shrink: 0;
        }

        .dash-item {
            background: #111; border: 1px solid #333; border-radius: 12px;
            padding: 8px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .dash-label { font-size: 0.65em; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .dash-val { font-size: 1.2em; font-weight: 900; }

        #online-waiting { position: absolute; top: 10px; left: 85px; font-size: 0.75em; color: #888; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; }
        #my-code { color: var(--gold); text-decoration: underline; }

        .led-container { display: flex; gap: 5px; margin-top: 4px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: var(--led-off); transition: all 0.3s; }
        .led.active { background: var(--win); box-shadow: 0 0 8px var(--win); }

        .p-area { display: flex; justify-content: space-around; gap: 8px; padding: 0 10px; flex-shrink: 0; }
        .p-box { flex: 1; padding: 12px 8px; border-radius: 15px; border: 2px solid #333; background: #1a1a1a; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; transition: 0.3s; }
        .active { border-color: var(--win); background: #142814; box-shadow: 0 0 15px rgba(46, 204, 113, 0.1); }
        
        .p-chips { font-size: 1.8em; color: var(--gold); font-weight: 900; margin-top: 5px; }
        
        .combo-text { 
            font-size: 1.1em; color: #fff; font-weight: 800; height: 1.4em; 
            margin-bottom: 8px; text-align: center;
            text-shadow: 0 0 5px rgba(255, 202, 40, 0.5); width: 100%;
            overflow: hidden; white-space: nowrap;
        }

        #verdict-line {
            height: 30px; line-height: 30px; text-align: center; font-weight: bold;
            color: var(--gold); font-size: 0.85em; text-transform: uppercase;
            background: rgba(0,0,0,0.3); margin: 5px 10px; border-radius: 5px;
            letter-spacing: 0.5px; overflow: hidden; white-space: nowrap;
        }

        canvas { 
            background: radial-gradient(circle, #2d5a27 0%, #132b12 100%); 
            border-top: 3px solid var(--wood); border-bottom: 3px solid var(--wood);
            width: 100%; height: 200px; touch-action: none; margin: 5px 0;
        }
        
        .btn-group { display: flex; justify-content: center; gap: 12px; padding: 10px 15px 30px 15px; flex-shrink: 0; }
        button { padding: 18px; font-size: 1.2em; cursor: pointer; background: var(--accent); border: none; color: white; border-radius: 15px; font-weight: bold; box-shadow: 0 5px 0 #a04a00; flex: 1; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #a04a00; }
        button:disabled { opacity: 0.1; }

        #btn-menu-top { position: absolute; top: 10px; right: 10px; background: #333; padding: 6px 12px; font-size: 0.7em; width: auto; box-shadow: none; z-index: 400; border-radius: 8px; }
        #btn-rules { position: absolute; top: 10px; left: 10px; background: #444; padding: 6px 12px; font-size: 0.7em; width: auto; border-radius: 8px; z-index: 400; box-shadow: none; }

        #rules-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .rules-card { background: var(--panel); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; max-width: 450px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .rules-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rules-table td, .rules-table th { padding: 10px; border-bottom: 1px solid #333; text-align: left; font-size: 0.85em; }
        .rules-table th { color: var(--gold); text-transform: uppercase; font-size: 0.75em; }

        #round-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.95); border: 3px solid var(--gold); color: var(--gold); 
            padding: 20px; border-radius: 15px; font-size: 1.5em; font-weight: bold; display: none; z-index: 600; text-align: center; width: 75%; pointer-events: none; 
        }

        #end-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 700;
        }

        .mini-die {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
            width: 18px; height: 18px; background: white; border-radius: 3px; padding: 2px; margin: 0 2px;
        }
        .mini-die .dot { background: #111; border-radius: 50%; width: 100%; height: 100%; }
        .mini-dice-container { display: flex; justify-content: center; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="update-loader"><div id="update-progress"></div></div>

    <div id="version-tag">VER 1.0.7</div>
    
    <h2 id="title-main" style="color:var(--gold); letter-spacing: 2px; text-shadow: 2px 2px #000; margin-bottom: 15px;">🎲 421 MASTER</h2>

    <div id="start-menu">
        <input type="text" id="player-name" placeholder="Ton Pseudo" maxlength="10">
        <button onclick="startApp('host')" style="background:var(--rembet); box-shadow:0 4px 0 #6c3483; width:100%; margin-bottom:12px;">CRÉER SALON</button>
        <input type="text" id="join-id" placeholder="Code Adversaire">
        <button onclick="startApp('join')" style="background:var(--win); box-shadow:0 4px 0 #1e8449; width:100%">REJOINDRE</button>
    </div>

    <div class="game-container" id="game-ui">
        <button id="btn-rules" onclick="toggleRules()">RÈGLES</button>
        <div id="online-waiting" style="display:none;">ID: <b id="my-code" onclick="copyID()">...</b></div>
        <button id="btn-menu-top" onclick="hardReset()">MENU</button>
        
        <div id="round-overlay"></div>
        
        <div id="end-screen">
            <h1 id="end-status" style="font-size: 3em; margin-bottom: 10px;"></h1>
            <p id="end-msg" style="margin-bottom: 25px;"></p>
            <button onclick="requestRevenge()" style="background:var(--win); width: 80%; margin-bottom: 10px;">REVANCHE</button>
            <button onclick="hardReset()" style="background:#444; width: 80%;">ACCUEIL</button>
        </div>

        <div class="dashboard">
            <div class="dash-item"><span class="dash-label">Phase</span><span id="phase-label" class="dash-val" style="color:var(--accent)">TIRAGE</span></div>
            <div class="dash-item" style="border-color: var(--gold);"><span class="dash-label">Pot</span><span id="pot" class="dash-val" style="color:var(--gold); font-size: 1.8em;">21</span></div>
            <div class="dash-item"><span class="dash-label">Coups</span><div class="led-container"><div id="led1" class="led"></div><div id="led2" class="led"></div><div id="led3" class="led"></div></div></div>
        </div>

        <div class="p-area">
            <div id="p0-ui" class="p-box">
                <div id="info-p0" class="combo-text"></div>
                <div id="dice-p0" class="mini-dice-container"></div>
                <div class="p-name" id="p0-label" style="font-size:0.8em; color:#888;">Hôte</div>
                <div class="p-chips" id="p0-chips">0</div>
            </div>
            <div id="p1-ui" class="p-box">
                <div id="info-p1" class="combo-text"></div>
                <div id="dice-p1" class="mini-dice-container"></div>
                <div class="p-name" id="p1-label" style="font-size:0.8em; color:#888;">Invité</div>
                <div class="p-chips" id="p1-chips">0</div>
            </div>
        </div>

        <div id="verdict-line">PRÊT À JOUER</div>

        <canvas id="gameCanvas" width="500" height="200"></canvas>

        <div class="btn-group">
            <button id="rollBtn">LANCER</button>
            <button id="stopBtn">STOP</button>
        </div>
    </div>

    <div id="rules-overlay" onclick="toggleRules()">
        <div class="rules-card" onclick="event.stopPropagation()">
            <h2 style="color: var(--gold); text-align: center; margin-top: 0;">HIÉRARCHIE</h2>
            <table class="rules-table">
                <tr><th>Main</th><th style="text-align: right;">Pts</th></tr>
                <tr><td>✨ <b>4-2-1</b></td><td style="text-align: right; color: var(--gold);">10</td></tr>
                <tr><td>🎲 <b>3 AS (111)</b></td><td style="text-align: right; color: var(--gold);">7</td></tr>
                <tr><td>🃏 <b>FICHES (11X)</b></td><td style="text-align: right; color: var(--gold);">X</td></tr>
                <tr><td>🔥 <b>BRELANS (XXX)</b></td><td style="text-align: right; color: var(--gold);">X</td></tr>
                <tr><td>📏 <b>SUITES (654...)</b></td><td style="text-align: right; color: var(--gold);">2</td></tr>
                <tr><td>📉 <b>SUITE (321)</b></td><td style="text-align: right; color: var(--gold);">1</td></tr>
                <tr><td>💩 <b>NÉNETTE (221)</b></td><td style="text-align: right; color: var(--loss);">Dernier</td></tr>
            </table>
            <button onclick="toggleRules()" style="background: var(--gold); color: #000; width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold;">FERMER</button>
        </div>
    </div>

<script>
    // --- DÉTECTION MISE À JOUR ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const worker = reg.installing;
                    document.getElementById('update-loader').style.display = 'block';
                    worker.onstatechange = () => {
                        if (worker.state === 'installing') document.getElementById('update-progress').style.width = '40%';
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('update-progress').style.width = '100%';
                            setTimeout(() => { location.reload(); }, 600);
                        }
                    };
                };
            }).catch(() => {});
        });
    }

    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), overlay = document.getElementById('round-overlay'), vLine = document.getElementById('verdict-line');
    let peer, conn, myPlayerIdx = -1, gameOver = false, isPaused = false, wakeLock = null;

    const sounds = { roll: new Audio('dice.wav'), clink: new Audio('clink.mp3'), win: new Audio('victory.mp3'), loss: new Audio('loss.mp3') };

    function playSfx(name) { try { const s = sounds[name]; if (s) { s.pause(); s.currentTime = 0; s.play().catch(e => {}); } } catch(e) {} }

    let game = {
        phase: "TIRAGE", pot: 21,
        players: [{name: "Hôte", chips: 0, comboDice: [], comboName: "", tirage: 0}, {name: "Invité", chips: 0, comboDice: [], comboName: "", tirage: 0}],
        activeP: 0, rollsDone: 0, rollsMax: 3, firstInPli: -1,
        dice: [0,0,0], kept: [false, false, false], isRolling: false,
        verdictText: "" 
    };

    function toggleRules() {
        const ro = document.getElementById('rules-overlay');
        ro.style.display = (ro.style.display === 'flex') ? 'none' : 'flex';
    }

    async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {} }
    function saveState() { localStorage.setItem('421_game', JSON.stringify(game)); localStorage.setItem('421_myIdx', myPlayerIdx); if(peer) localStorage.setItem('421_lastPeerID', peer.id); if(conn) localStorage.setItem('421_lastTargetID', conn.peer); }
    function loadState() { const saved = localStorage.getItem('421_game'); if(saved) { game = JSON.parse(saved); myPlayerIdx = parseInt(localStorage.getItem('421_myIdx')); return true; } return false; }
    function hardReset() { localStorage.clear(); location.reload(); }

    function startApp(mode) {
        document.getElementById('title-main').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        requestWakeLock();
        if(mode === 'host') initOnline(); else joinOnline();
    }

    function analyze(dice) {
        if (!dice || dice[0] === 0) return { rank: -1, pts: 0, dice: [], name: "" };
        const dSort = [...dice].sort((a,b) => b-a), s = dSort.join('');
        let res = { dice: [...dSort], pts: 1, rank: parseInt(s), shortName: dSort.join('-'), name: dSort.join('-') + " (1 PT)" };
        
        if (s === "421") res = { ...res, rank: 1000000, pts: 10, shortName: "4-2-1", name: "4-2-1 (10 PT)" };
        else if (s === "111") res = { ...res, rank: 950000, pts: 7, shortName: "3 AS", name: "3 AS (7 PT)" };
        else if (dSort.filter(v => v === 1).length === 2) { 
            let a = dSort.find(v => v !== 1) || 1; 
            res = { ...res, rank: 800000 + (a*1000), pts: a, shortName: `2 AS-${a}`, name: `2 AS-${a} (${a} PT)` }; 
        }
        else if (dSort[0] === dSort[1] && dSort[1] === dSort[2]) {
            res = { ...res, rank: 700000 + (dSort[0]*1000), pts: dSort[0], shortName: `BRELAN ${dSort[0]}`, name: `BRELAN ${dSort[0]} (${dSort[0]} PT)` };
        }
        else if (s === "221") res = { ...res, rank: 0, pts: 2, shortName: "NÉNETTE", name: "NÉNETTE (2 PT)" };
        else if (["654","543","432","321"].includes(s)) {
            let ptsSuite = (s === "321" ? 1 : 2);
            res = { ...res, rank: 600000 + parseInt(s), pts: ptsSuite, shortName: "SUITE", name: `SUITE (${ptsSuite} PT)` };
        }
        return res;
    }

    function updateUI() {
        if(game.phase === "DECHARGE" && !gameOver) { if(game.players[0].chips === 0) triggerEnd(0); else if(game.players[1].chips === 0) triggerEnd(1); }
        for(let i=1; i<=3; i++) { document.getElementById(`led${i}`).className = (i <= (game.rollsMax - game.rollsDone)) ? "led active" : "led"; }
        document.getElementById('pot').innerText = game.pot;
        document.getElementById('phase-label').innerText = game.phase;
        document.getElementById('phase-label').style.color = (game.phase === "CHARGE") ? "var(--loss)" : (game.phase === "DECHARGE" ? "var(--win)" : "var(--accent)");
        
        for(let i=0; i<2; i++) {
            const p = game.players[i], dCont = document.getElementById(`dice-p${i}`), iCont = document.getElementById(`info-p${i}`);
            document.getElementById(`p${i}-label`).innerText = p.name;
            document.getElementById(`p${i}-chips`).innerText = p.chips;
            document.getElementById(`p${i}-ui`).className = (game.activeP === i && !gameOver) ? "p-box active" : "p-box";
            dCont.innerHTML = ""; iCont.innerText = "";
            if (game.phase === "TIRAGE") { if(p.tirage > 0) { dCont.appendChild(createMiniDie(p.tirage)); iCont.innerText = p.tirage; } }
            else {
                let isCurrentInFrame = (i === game.activeP && !game.isRolling);
                let displayD = isCurrentInFrame ? game.dice : (p.comboDice || []);
                let displayN = isCurrentInFrame ? (game.dice[0] !== 0 ? analyze(game.dice).name : "") : (p.comboName || "");
                if (displayD && displayD[0] !== 0) { 
                    const sortedD = [...displayD].sort((a,b)=>b-a);
                    sortedD.forEach(v => dCont.appendChild(createMiniDie(v))); 
                    iCont.innerText = displayN; 
                }
            }
        }
        
        const myTurn = (game.activeP === myPlayerIdx && !gameOver && !isPaused && !game.isRolling);
        document.getElementById('rollBtn').disabled = !myTurn;
        document.getElementById('stopBtn').disabled = !myTurn || game.rollsDone === 0 || game.dice[0] === 0 || game.phase === "TIRAGE";
        document.getElementById('stopBtn').style.background = document.getElementById('stopBtn').disabled ? "#222" : "#444";

        if (isPaused && game.verdictText) vLine.innerText = game.verdictText;
        else vLine.innerText = (game.activeP === myPlayerIdx) ? "À TOI DE JOUER" : `TOUR DE ${game.players[game.activeP].name.toUpperCase()}`;
        saveState();
    }

    function triggerEnd(winnerIdx) {
        gameOver = true;
        document.getElementById('end-status').innerText = (winnerIdx === myPlayerIdx) ? "VICTOIRE !" : "DÉFAITE...";
        document.getElementById('end-status').style.color = (winnerIdx === myPlayerIdx) ? "var(--win)" : "var(--loss)";
        document.getElementById('end-msg').innerText = (winnerIdx === myPlayerIdx) ? "Félicitations Champion !" : `Le gagnant est ${game.players[winnerIdx].name}`;
        document.getElementById('end-screen').style.display = 'flex';
        playSfx(winnerIdx === myPlayerIdx ? 'win' : 'loss');
    }

    function requestRevenge() { sendData({type: 'REVENGE_REQ'}); showOverlay("Attente adversaire...", 2000); }
    function resetForRevenge() {
        game.phase = "TIRAGE"; game.pot = 21; gameOver = false;
        game.players.forEach(p => { p.chips = 0; p.tirage = 0; p.comboDice = []; p.comboName = ""; });
        game.activeP = 0; game.rollsDone = 0; game.rollsMax = 3; game.firstInPli = -1; game.verdictText = "";
        game.dice = [0,0,0]; game.kept = [false, false, false]; vLine.innerText = "NOUVELLE PARTIE";
        document.getElementById('end-screen').style.display = 'none'; updateUI(); draw();
    }

    function draw() {
        ctx.clearRect(0,0,500,200);
        if (game.phase === "TIRAGE") { if (game.dice[0] > 0) drawDie(200, 50, 100, game.dice[0], false); } 
        else { for(let i=0; i<3; i++) if(game.dice[i] > 0) drawDie(35 + i * 155, 50, 95, game.dice[i], game.kept[i]); }
    }

    function createMiniDie(val) {
        const die = document.createElement('div'); die.className = 'mini-die';
        const dots = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
        for(let i=0; i<9; i++) { const dot = document.createElement('div'); if(dots[val] && dots[val].includes(i)) dot.className = 'dot'; die.appendChild(dot); }
        return die;
    }

    function drawDie(x, y, size, val, isKept) {
        if(isKept) {
            ctx.shadowColor = "rgba(231, 76, 60, 0.7)"; ctx.shadowBlur = 15; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.roundRect(x-4, y-4, size+8, size+8, 18); ctx.fill();
            ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 6; ctx.stroke();
        } else {
            ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 6; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.roundRect(x,y,size,size,18); ctx.fill(); ctx.strokeStyle = "#ddd"; ctx.lineWidth = 1; ctx.stroke();
        }
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.fillStyle = "#111";
        const p = size/4, ptsMap = {1:[[2,2]], 2:[[1,1],[3,3]], 3:[[1,1],[2,2],[3,3]], 4:[[1,1],[1,3],[3,1],[3,3]], 5:[[1,1],[1,3],[2,2],[3,1],[3,3]], 6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]};
        if(ptsMap[val]) ptsMap[val].forEach(pt => { ctx.beginPath(); ctx.arc(x+pt[0]*p, y+pt[1]*p, size/12, 0, Math.PI*2); ctx.fill(); });
    }

    function roll() {
        if(gameOver || game.isRolling || isPaused || game.activeP !== myPlayerIdx) return;
        let final = (game.phase === "TIRAGE") ? [Math.floor(Math.random()*6)+1] : [0,0,0];
        if (game.phase !== "TIRAGE") { for(let i=0; i<3; i++) final[i] = (!game.kept[i] || game.dice[0] === 0) ? Math.floor(Math.random()*6)+1 : game.dice[i]; }
        playSfx('roll'); sendData({type:'ANIM', kept: [...game.kept], final: final, senderIdx: myPlayerIdx}); runAnim(final, myPlayerIdx);
    }

    function runAnim(finalValues, senderIdx) {
        game.isRolling = true; updateUI(); let count = 0;
        let anim = setInterval(() => {
            if(game.phase === "TIRAGE") game.dice = [Math.floor(Math.random()*6)+1];
            else { for(let i=0; i<3; i++) if(!game.kept[i]) game.dice[i] = Math.floor(Math.random()*6)+1; }
            draw(); if(++count > 12) { clearInterval(anim); game.dice = finalValues; game.isRolling = false; if(game.activeP === myPlayerIdx) handleRollResult(); updateUI(); draw(); }
        }, 50);
    }

    function handleRollResult() {
        if(game.phase === "TIRAGE") {
            game.players[game.activeP].tirage = game.dice[0]; game.dice = [0,0,0]; 
            if(game.players[0].tirage > 0 && game.players[1].tirage > 0) {
                isPaused = true; const duelMsg = `${game.players[0].name}: ${game.players[0].tirage} vs ${game.players[1].name}: ${game.players[1].tirage}`;
                game.verdictText = duelMsg; showOverlay(duelMsg, 2000); sendData({type:'OVERLAY', msg: duelMsg, duration: 2000}); updateUI();
                setTimeout(() => {
                    if(game.players[0].tirage === game.players[1].tirage) {
                        game.players[0].tirage = 0; game.players[1].tirage = 0;
                        game.verdictText = "ÉGALITÉ !"; showOverlay("ÉGALITÉ !", 2000); sendData({type:'OVERLAY', msg: "ÉGALITÉ !", duration: 2000}); isPaused = false; finishTurn();
                    } else {
                        game.activeP = (game.players[0].tirage < game.players[1].tirage) ? 0 : 1; game.phase = "CHARGE";
                        const startMsg = `${game.players[game.activeP].name} COMMENCE !`;
                        game.verdictText = startMsg; showOverlay(startMsg, 2000); sendData({type:'OVERLAY', msg: startMsg, duration: 2000});
                        setTimeout(() => { isPaused = false; finishTurn(); }, 2000);
                    }
                }, 2000);
            } else { game.activeP = (game.activeP === 0) ? 1 : 0; finishTurn(); }
        } else { 
            const sorted = [...game.dice].sort((a,b)=>b-a), s = sorted.join('');
            if(s === "421") {
                game.verdictText = "!!! 4-2-1 !!!"; updateUI(); triggerGoldFlash(); sendData({type:'OVERLAY', msg: "!!! 4-2-1 !!!", duration: 2500, goldGoldFlash: true});
            } else if(s === "221") {
                const pIdx = game.activeP, oppIdx = 1 - pIdx;
                let take = (game.phase === "CHARGE") ? Math.min(game.pot, 2) : Math.min(game.players[oppIdx].chips, 2);
                if(game.phase === "CHARGE") game.pot -= take; else game.players[oppIdx].chips -= take;
                game.players[pIdx].chips += take; playSfx('clink'); game.verdictText = "NÉNETTE !"; updateUI();
                triggerFlash(); sendData({type:'OVERLAY', msg: "NÉNETTE !", duration: 2000, flash: true});
            }
            game.rollsDone++; if(game.rollsDone === game.rollsMax) stop(); else finishTurn(); 
        }
    }

    function triggerFlash() { document.body.classList.add('nenette-flash'); setTimeout(() => document.body.classList.remove('nenette-flash'), 600); }
    function triggerGoldFlash() { document.body.classList.add('gold-flash'); setTimeout(() => document.body.classList.remove('gold-flash'), 800); }

    function stop() {
        if(isPaused || game.isRolling || game.activeP !== myPlayerIdx || game.dice[0] === 0 || game.rollsDone === 0) return;
        const res = analyze(game.dice); game.players[game.activeP].comboDice = [...res.dice]; game.players[game.activeP].comboName = res.name;
        game.dice = [0, 0, 0]; game.kept = [false, false, false];
        if(game.firstInPli === -1) { game.firstInPli = game.activeP; game.rollsMax = game.rollsDone; game.activeP = (game.activeP === 0) ? 1 : 0; game.rollsDone = 0; } 
        else resolvePli(); finishTurn();
    }

    function resolvePli() {
        isPaused = true; const p0 = analyze(game.players[0].comboDice), p1 = analyze(game.players[1].comboDice);
        let winMsg = (p0.rank === p1.rank) ? "⚖️ REMBET !" : "";
        let battleTxt = "";
        if(p0.rank !== p1.rank) {
            let wIdx = (p0.rank > p1.rank) ? 0 : 1, lIdx = 1 - wIdx, pts = (wIdx === 0 ? p0.pts : p1.pts);
            battleTxt = `${analyze(game.players[wIdx].comboDice).shortName} BAT ${analyze(game.players[lIdx].comboDice).shortName}`;
            if(game.phase === "CHARGE") { let t = Math.min(game.pot, pts); game.players[lIdx].chips += t; game.pot -= t; winMsg = `${game.players[lIdx].name} +${t}`; if(game.pot <= 0) game.phase = "DECHARGE"; }
            else { let t = Math.min(game.players[wIdx].chips, pts); game.players[wIdx].chips -= t; game.players[lIdx].chips += t; winMsg = `${game.players[wIdx].name} DONNE ${t}`; }
            playSfx('clink'); game.activeP = lIdx;
        } else { game.activeP = game.firstInPli; battleTxt = "ÉGALITÉ !"; }
        game.verdictText = battleTxt; updateUI(); sendData({type:'OVERLAY', msg: winMsg, duration: 4000, verdict: battleTxt}); showOverlay(winMsg, 4000);
        setTimeout(() => { isPaused = false; game.firstInPli = -1; game.rollsMax = 3; game.rollsDone = 0; game.verdictText = ""; game.dice = [0, 0, 0]; game.players[0].comboDice = []; game.players[1].comboDice = []; game.players[0].comboName = ""; game.players[1].comboName = ""; finishTurn(); }, 4000);
    }

    function initOnline() { 
        game.players[0].name = document.getElementById('player-name').value || "Hôte";
        peer = new Peer(localStorage.getItem('421_lastPeerID') || '421-' + Math.floor(Math.random()*9999));
        peer.on('open', id => { document.getElementById('my-code').innerText = id; document.getElementById('online-waiting').style.display = 'block'; saveState(); });
        peer.on('connection', c => { conn = c; myPlayerIdx = 0; setupSync(); });
    }

    function joinOnline() {
        game.players[1].name = document.getElementById('player-name').value || "Invité";
        peer = new Peer(); peer.on('open', () => { conn = peer.connect(document.getElementById('join-id').value || localStorage.getItem('421_lastTargetID')); myPlayerIdx = 1; setupSync(); });
    }

    function setupSync() {
        conn.on('open', () => { sendData({type:'HELLO', name: game.players[myPlayerIdx].name, game: (myPlayerIdx === 0 ? game : null)}); document.getElementById('start-menu').style.display='none'; document.getElementById('game-ui').style.display='flex'; updateUI(); draw(); });
        conn.on('data', d => {
            if(d.type === 'HELLO') { game.players[myPlayerIdx===0?1:0].name = d.name; if(d.game && myPlayerIdx === 1) game = d.game; updateUI(); }
            if(d.type === 'SYNC') { game = d.game; updateUI(); draw(); }
            if(d.type === 'ANIM') { game.kept = d.kept; if(game.phase !== "TIRAGE" || d.senderIdx !== myPlayerIdx) runAnim(d.final, d.senderIdx); }
            if(d.type === 'OVERLAY') { if(d.verdict) { game.verdictText = d.verdict; isPaused = true; } showOverlay(d.msg, d.duration); updateUI(); if(d.flash) triggerFlash(); if(d.goldGoldFlash) triggerGoldFlash(); setTimeout(() => { isPaused = false; updateUI(); }, d.duration); }
            if(d.type === 'REVENGE_REQ') { if(confirm("Revanche ?")) { resetForRevenge(); sendData({type: 'REVENGE_OK'}); } }
            if(d.type === 'REVENGE_OK') resetForRevenge();
        });
    }

    function sendData(d) { if(conn && conn.open) conn.send(d); }
    function finishTurn() { sendData({type:'SYNC', game:game}); updateUI(); draw(); }
    function copyID() { navigator.clipboard.writeText(document.getElementById('my-code').innerText); alert("Code copié !"); }
    function showOverlay(txt, dur) { overlay.innerText = txt; overlay.style.display = 'block'; setTimeout(() => overlay.style.display = 'none', dur); }
    
    document.getElementById('rollBtn').addEventListener('click', roll);
    document.getElementById('stopBtn').addEventListener('click', stop);
    canvas.addEventListener('pointerdown', e => {
        if(game.isRolling || game.phase === "TIRAGE" || game.rollsDone === 0 || game.activeP !== myPlayerIdx) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (500 / r.width);
        for(let i=0; i<3; i++) if(x > 35+i*155 && x < 130+i*155) game.kept[i] = !game.kept[i];
        updateUI(); draw();
    });

    window.onload = () => { if(loadState()) { document.getElementById('player-name').value = game.players[myPlayerIdx].name; if(myPlayerIdx === 0) startApp('host'); else startApp('join'); } };
</script>

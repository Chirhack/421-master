<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>421 MASTER - DEBUG V1.1.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --panel: #1a1a1a; --accent: #e67e22; --gold: #ffca28; --win: #2ecc71; --loss: #e74c3c; }
        html, body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 0; height: 100%; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* UI Simple et Propre */
        #start-menu { background: var(--panel); padding: 20px; border-radius: 15px; text-align: center; margin-top: 50px; width: 80%; max-width: 350px; border: 2px solid #333; }
        input { padding: 12px; margin: 10px 0; width: 80%; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        button { padding: 15px; background: var(--accent); border: none; color: white; border-radius: 10px; font-weight: bold; width: 90%; cursor: pointer; margin: 5px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .game-container { display: none; width: 100%; max-width: 500px; flex-direction: column; height: 100vh; }
        .header { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; background: #111; gap: 5px; }
        .stat { background: #222; padding: 10px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.7em; color: #888; display: block; }
        .val { font-size: 1.2em; font-weight: bold; color: var(--gold); }

        .players-grid { display: flex; justify-content: space-around; padding: 15px; gap: 10px; }
        .player-card { flex: 1; background: #1a1a1a; border: 2px solid #333; border-radius: 12px; padding: 10px; text-align: center; transition: 0.3s; }
        .player-card.active { border-color: var(--win); background: #142814; }
        .p-name { font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        .p-chips { font-size: 2em; font-weight: 900; color: var(--gold); }
        .p-combo { font-size: 0.9em; height: 1.2em; color: #fff; font-weight: bold; }

        canvas { background: #1e3d1a; border-top: 4px solid #333; border-bottom: 4px solid #333; width: 100%; height: 180px; }
        .controls { padding: 20px; display: flex; gap: 10px; }
        
        #msg-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 20px; border-radius: 15px; z-index: 1000; display: none; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h2 style="color:var(--gold)">421 MASTER</h2>
        <input type="text" id="pName" placeholder="Ton Pseudo">
        <button onclick="initPeer('host')" style="background:#8e44ad">CRÉER SALON</button>
        <input type="text" id="joinID" placeholder="Code Code">
        <button onclick="initPeer('join')" style="background:#27ae60">REJOINDRE</button>
        <p id="my-id-display" style="font-size:0.8em; color:#888; margin-top:10px;"></p>
    </div>

    <div id="msg-overlay"></div>

    <div class="game-container" id="game-ui">
        <div class="header">
            <div class="stat"><span class="label">POT</span><span id="ui-pot" class="val">21</span></div>
            <div class="stat"><span class="label">PHASE</span><span id="ui-phase" class="val">CHARGE</span></div>
            <div class="stat"><span class="label">COUPS</span><span id="ui-rolls" class="val">3</span></div>
        </div>

        <div class="players-grid">
            <div id="card-0" class="player-card">
                <div class="p-name" id="name-0">Hôte</div>
                <div class="p-combo" id="combo-0">---</div>
                <div class="p-chips" id="chips-0">0</div>
            </div>
            <div id="card-1" class="player-card">
                <div class="p-name" id="name-1">Invité</div>
                <div class="p-combo" id="combo-1">---</div>
                <div class="p-chips" id="chips-1">0</div>
            </div>
        </div>

        <canvas id="canvas" width="500" height="200"></canvas>

        <div class="controls">
            <button id="btnRoll">LANCER</button>
            <button id="btnStop" style="background:#555">STOP</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let peer, conn, myIdx = -1;
    let game = {
        phase: "TIRAGE", pot: 21, activeP: 0, rollsDone: 0, rollsMax: 3, firstInPli: -1,
        dice: [0,0,0], kept: [false, false, false],
        players: [{name:"Hôte", chips:0, lastCombo:""}, {name:"Invité", chips:0, lastCombo:""}],
        isRolling: false
    };

    // LOGIQUE DE COMBINAISON (TES RÈGLES)
    function analyze(dice) {
        if (!dice || dice[0] === 0) return { rank: -1, pts: 1, name: "" };
        const d = [...dice].sort((a,b) => b-a);
        const s = d.join('');
        const val = parseInt(s);

        if (s === "421") return { rank: 1000, pts: 10, name: "4-2-1" };
        if (s === "111") return { rank: 900, pts: 7, name: "BRELAN AS" };
        if (s === "116") return { rank: 860, pts: 6, name: "AS-AS-6" };
        if (s === "666") return { rank: 850, pts: 6, name: "BRELAN 6" };
        if (s === "115") return { rank: 840, pts: 5, name: "AS-AS-5" };
        if (s === "555") return { rank: 830, pts: 5, name: "BRELAN 5" };
        if (s === "114") return { rank: 820, pts: 4, name: "AS-AS-4" };
        if (s === "444") return { rank: 810, pts: 4, name: "BRELAN 4" };
        if (s === "113") return { rank: 800, pts: 3, name: "AS-AS-3" };
        if (s === "333") return { rank: 790, pts: 3, name: "BRELAN 3" };
        if (s === "112") return { rank: 780, pts: 2, name: "AS-AS-2" };
        if (s === "222") return { rank: 770, pts: 2, name: "BRELAN 2" };
        if (s === "654") return { rank: 604, pts: 2, name: "SUITE 6" };
        if (s === "543") return { rank: 603, pts: 2, name: "SUITE 5" };
        if (s === "432") return { rank: 602, pts: 2, name: "SUITE 4" };
        if (s === "321") return { rank: 601, pts: 1, name: "SUITE 3" };
        if (s === "221") return { rank: 0, pts: 2, name: "NÉNETTE" };
        return { rank: val, pts: 1, name: d.join('-') };
    }

    function initPeer(mode) {
        const name = document.getElementById('pName').value || mode;
        if(mode === 'host') {
            myIdx = 0; game.players[0].name = name;
            peer = new Peer('421-' + Math.floor(Math.random()*9999));
            peer.on('open', id => document.getElementById('my-id-display').innerText = "ID: " + id);
            peer.on('connection', c => { conn = c; setupConn(); });
        } else {
            myIdx = 1; game.players[1].name = name;
            const target = document.getElementById('joinID').value;
            peer = new Peer();
            peer.on('open', () => { conn = peer.connect(target); setupConn(); });
        }
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
    }

    function setupConn() {
        conn.on('open', () => { 
            send({type:'JOIN', name: game.players[myIdx].name}); 
            updateUI(); 
        });
        conn.on('data', data => {
            if(data.type === 'JOIN') { game.players[1-myIdx].name = data.name; sync(); }
            if(data.type === 'SYNC') { game = data.game; updateUI(); draw(); }
            if(data.type === 'MSG') { flashMsg(data.txt, data.dur); }
        });
    }

    function sync() { if(conn) conn.send({type:'SYNC', game:game}); updateUI(); draw(); }
    function send(data) { if(conn) conn.send(data); }

    function updateUI() {
        document.getElementById('ui-pot').innerText = game.pot;
        document.getElementById('ui-phase').innerText = game.phase;
        document.getElementById('ui-rolls').innerText = game.rollsMax - game.rollsDone;
        for(let i=0; i<2; i++) {
            document.getElementById(`name-${i}`).innerText = game.players[i].name;
            document.getElementById(`chips-${i}`).innerText = game.players[i].chips;
            document.getElementById(`combo-${i}`).innerText = game.players[i].lastCombo;
            document.getElementById(`card-${i}`).className = (game.activeP === i) ? "player-card active" : "player-card";
        }
        document.getElementById('btnRoll').disabled = (game.activeP !== myIdx || game.isRolling);
        document.getElementById('btnStop').disabled = (game.activeP !== myIdx || game.rollsDone === 0 || game.phase === "TIRAGE");
    }

    function roll() {
        if(game.isRolling) return;
        game.isRolling = true;
        let count = 0;
        let timer = setInterval(() => {
            for(let i=0; i<3; i++) {
                if(game.phase === "TIRAGE") { if(i===0) game.dice[0] = Math.floor(Math.random()*6)+1; }
                else if(!game.kept[i]) game.dice[i] = Math.floor(Math.random()*6)+1;
            }
            draw();
            if(++count > 10) {
                clearInterval(timer);
                game.isRolling = false;
                processRoll();
            }
        }, 60);
    }

    function processRoll() {
        const res = analyze(game.dice);
        
        // RÈGLE NÉNETTE PUNITION IMMÉDIATE
        if(res.name === "NÉNETTE") {
            let p = game.players[game.activeP];
            let opp = game.players[1-game.activeP];
            if(game.phase === "CHARGE") { let t = Math.min(game.pot, 2); game.pot -= t; p.chips += t; }
            else { let t = Math.min(opp.chips, 2); opp.chips -= t; p.chips += t; }
            flashMsg("NÉNETTE ! +2", 1500);
            send({type:'MSG', txt:"NÉNETTE ! +2", dur:1500});
        }

        if(game.phase === "TIRAGE") {
            game.players[game.activeP].lastCombo = "Dé: " + game.dice[0];
            if(game.activeP === 0) game.activeP = 1;
            else {
                let d0 = parseInt(game.players[0].lastCombo.split(': ')[1]);
                let d1 = game.dice[0];
                if(d0 === d1) { game.activeP = 0; game.players[0].lastCombo = ""; game.players[1].lastCombo = ""; }
                else {
                    game.activeP = (d0 < d1) ? 0 : 1;
                    game.phase = "CHARGE";
                    flashMsg(game.players[game.activeP].name + " commence !", 2000);
                }
            }
            game.dice = [0,0,0];
        } else {
            game.rollsDone++;
            if(game.rollsDone >= game.rollsMax) stop();
        }
        sync();
    }

    function stop() {
        const res = analyze(game.dice);
        game.players[game.activeP].lastCombo = res.name;
        let finalDice = [...game.dice];
        
        if(game.firstInPli === -1) {
            game.firstInPli = game.activeP;
            game.rollsMax = game.rollsDone;
            game.activeP = 1 - game.activeP;
            game.rollsDone = 0;
            game.dice = [0,0,0];
            game.kept = [false,false,false];
        } else {
            resolvePli(finalDice);
        }
        sync();
    }

    function resolvePli(dInvité) {
        let p0 = analyze(myIdx === 0 ? game.dice : dInvité); // À simplifier pour la démo
        // Pour le debug, on va juste comparer les combos stockés
        let res0 = analyze(game.activeP === 0 ? game.dice : game.players[0].lastCombo === "---" ? [0,0,0] : [1,1,1]); // Logique de secours
        // En réalité on compare les deux derniers combos
        flashMsg("FIN DU PLI", 2000);
        // Reset pour tour suivant
        game.rollsMax = 3; game.rollsDone = 0; game.firstInPli = -1;
        game.dice = [0,0,0]; game.kept = [false,false,false];
    }

    function draw() {
        ctx.clearRect(0,0,500,200);
        game.dice.forEach((v, i) => {
            if(v > 0) {
                let x = 50 + i*150;
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.roundRect(x, 50, 100, 100, 10); ctx.fill();
                if(game.kept[i]) { ctx.strokeStyle = "red"; ctx.lineWidth = 4; ctx.stroke(); }
                ctx.fillStyle = "#000"; ctx.font = "bold 40px sans-serif"; ctx.fillText(v, x+40, 110);
            }
        });
    }

    function flashMsg(txt, dur) {
        const ov = document.getElementById('msg-overlay');
        ov.innerText = txt; ov.style.display = 'block';
        setTimeout(() => ov.style.display = 'none', dur);
    }

    document.getElementById('btnRoll').onclick = roll;
    document.getElementById('btnStop').onclick = stop;
    canvas.onclick = (e) => {
        if(game.activeP !== myIdx || game.rollsDone === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (500 / rect.width);
        if(x < 150) game.kept[0] = !game.kept[0];
        else if(x < 300) game.kept[1] = !game.kept[1];
        else game.kept[2] = !game.kept[2];
        draw();
    };
</script>
</body>
</html>

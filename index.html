<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>421 MASTER - VER 1.1.2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #0b0b0b; --panel: #1a1a1a; --accent: #e67e22; 
            --gold: #ffca28; --wood: #4e342e; --win: #2ecc71; 
            --loss: #e74c3c;
        }
        
        html, body { 
            background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
        }

        #version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 0.7em; color: #555; z-index: 1000; }

        /* MENU STYLE ORIGINE */
        #start-menu { 
            background: var(--panel); padding: 30px; border-radius: 20px; 
            border: 4px solid var(--wood); text-align: center; width: 85%; max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { 
            padding: 12px; border-radius: 10px; border: 1px solid #444; 
            background: #222; color: white; width: 90%; margin: 10px 0; text-align: center;
        }
        button { 
            padding: 18px; font-size: 1.1em; cursor: pointer; background: var(--accent); 
            border: none; color: white; border-radius: 15px; font-weight: bold; 
            width: 100%; margin: 5px 0; box-shadow: 0 5px 0 #a04a00;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #a04a00; }
        button:disabled { opacity: 0.3; }

        /* JEU STYLE ORIGINE */
        .game-container { 
            display: none; flex-direction: column; width: 100%; height: 100%; 
            max-width: 500px; background: var(--bg);
        }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: 20px; }
        .dash-item { background: #111; border: 1px solid #333; border-radius: 12px; padding: 10px; text-align: center; }
        .dash-label { font-size: 0.6em; color: #888; text-transform: uppercase; }
        .dash-val { font-size: 1.3em; font-weight: 900; color: var(--gold); }

        .players-area { display: flex; justify-content: space-around; padding: 10px; gap: 10px; }
        .p-box { 
            flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #333; 
            background: #1a1a1a; text-align: center; min-height: 100px;
        }
        .p-box.active { border-color: var(--win); background: #142814; }
        .p-chips { font-size: 2.5em; font-weight: 900; color: var(--gold); }
        .p-name { font-size: 0.8em; color: #888; margin-top: 5px; }
        .p-combo { font-size: 1em; font-weight: bold; color: #fff; height: 1.2em; }

        canvas { background: radial-gradient(circle, #2d5a27 0%, #132b12 100%); border-y: 4px solid var(--wood); width: 100%; height: 200px; margin: 10px 0; }
        
        .controls { display: flex; gap: 15px; padding: 20px; }
        
        #overlay { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); border: 3px solid var(--gold); padding: 25px; 
            border-radius: 20px; color: var(--gold); font-size: 1.8em; font-weight: bold; 
            display: none; z-index: 2000; text-align: center; width: 70%;
        }
    </style>
</head>
<body>

    <div id="version-tag">VER 1.1.2 - REGLES & DESIGN FIX</div>
    <div id="overlay"></div>

    <div id="start-menu">
        <h2 style="color:var(--gold); margin-top:0;">🎲 421 MASTER</h2>
        <input type="text" id="pName" placeholder="Ton Pseudo" maxlength="10">
        <button onclick="init('host')" style="background:#8e44ad; box-shadow:0 5px 0 #5b2c6f;">CRÉER SALON</button>
        <div style="margin: 15px 0; color: #555;">OU</div>
        <input type="text" id="joinID" placeholder="Code Adversaire">
        <button onclick="init('join')" style="background:#27ae60; box-shadow:0 5px 0 #1e8449;">REJOINDRE</button>
        <p id="display-id" style="font-size:0.8em; color:var(--gold); margin-top:15px;"></p>
    </div>

    <div class="game-container" id="game-ui">
        <div class="dashboard">
            <div class="dash-item"><span class="dash-label">Pot</span><span id="ui-pot" class="dash-val">21</span></div>
            <div class="dash-item"><span class="dash-label">Phase</span><span id="ui-phase" class="dash-val">---</span></div>
            <div class="dash-item"><span class="dash-label">Lancés</span><span id="ui-rolls" class="dash-val">3</span></div>
        </div>

        <div class="players-area">
            <div id="card-0" class="p-box">
                <div id="combo-0" class="p-combo"></div>
                <div id="chips-0" class="p-chips">0</div>
                <div id="name-0" class="p-name">Hôte</div>
            </div>
            <div id="card-1" class="p-box">
                <div id="combo-1" class="p-combo"></div>
                <div id="chips-1" class="p-chips">0</div>
                <div id="name-1" class="p-name">Invité</div>
            </div>
        </div>

        <canvas id="mainCanvas" width="500" height="200"></canvas>

        <div class="controls">
            <button id="rollBtn">LANCER</button>
            <button id="stopBtn" style="background:#555; box-shadow:0 5px 0 #333;">STOP</button>
        </div>
    </div>

<script>
    // --- LOGIQUE ET SYNC ---
    const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d'), ov = document.getElementById('overlay');
    let peer, conn, myIdx = -1;
    let game = {
        phase: "TIRAGE", pot: 21, activeP: 0, rollsDone: 0, rollsMax: 3, firstInPli: -1,
        dice: [0,0,0], kept: [false, false, false], isRolling: false,
        players: [{name:"Hôte", chips:0, lastC:""}, {name:"Invité", chips:0, lastC:""}]
    };

    function analyze(dice) {
        if (!dice || dice[0] === 0) return { rank: -1, pts: 1, name: "" };
        const d = [...dice].sort((a,b) => b-a); const s = d.join(''); const val = parseInt(s);
        if (s === "421") return { rank: 1000, pts: 10, name: "4-2-1" };
        if (s === "111") return { rank: 900, pts: 7, name: "3 AS" };
        if (s === "116") return { rank: 860, pts: 6, name: "AS-AS-6" };
        if (s === "666") return { rank: 850, pts: 6, name: "BRELAN 6" };
        if (s === "115") return { rank: 840, pts: 5, name: "AS-AS-5" };
        if (s === "555") return { rank: 830, pts: 5, name: "BRELAN 5" };
        if (s === "114") return { rank: 820, pts: 4, name: "AS-AS-4" };
        if (s === "444") return { rank: 810, pts: 4, name: "BRELAN 4" };
        if (s === "113") return { rank: 800, pts: 3, name: "AS-AS-3" };
        if (s === "333") return { rank: 790, pts: 3, name: "BRELAN 3" };
        if (s === "112") return { rank: 780, pts: 2, name: "AS-AS-2" };
        if (s === "222") return { rank: 770, pts: 2, name: "BRELAN 2" };
        if (s === "654") return { rank: 604, pts: 2, name: "SUITE 6" };
        if (s === "543") return { rank: 603, pts: 2, name: "SUITE 5" };
        if (s === "432") return { rank: 602, pts: 2, name: "SUITE 4" };
        if (s === "321") return { rank: 601, pts: 1, name: "SUITE 3" };
        if (s === "221") return { rank: 0, pts: 2, name: "NÉNETTE" };
        return { rank: val, pts: 1, name: d.join('-') };
    }

    function init(mode) {
        const n = document.getElementById('pName').value || mode;
        if(mode==='host'){
            myIdx=0; game.players[0].name=n;
            peer = new Peer('421-'+Math.floor(Math.random()*999));
            peer.on('open', id => document.getElementById('display-id').innerText="TON CODE : "+id);
            peer.on('connection', c => {conn=c; setup();});
        } else {
            myIdx=1; game.players[1].name=n;
            peer = new Peer();
            peer.on('open', () => {conn=peer.connect(document.getElementById('joinID').value); setup();});
        }
        document.getElementById('start-menu').style.display='none';
        document.getElementById('game-ui').style.display='flex';
    }

    function setup() {
        conn.on('open', () => { send({type:'JOIN', name:game.players[myIdx].name}); sync(); });
        conn.on('data', d => {
            if(d.type==='JOIN'){game.players[1-myIdx].name=d.name; sync();}
            if(d.type==='SYNC'){game=d.game; updateUI(); draw();}
            if(d.type==='MSG'){showMsg(d.txt, d.dur);}
        });
    }

    function sync(){ if(conn) conn.send({type:'SYNC', game:game}); updateUI(); draw(); }
    function send(d){ if(conn) conn.send(d); }

    function updateUI(){
        document.getElementById('ui-pot').innerText = game.pot;
        document.getElementById('ui-phase').innerText = game.phase;
        document.getElementById('ui-rolls').innerText = game.rollsMax - game.rollsDone;
        for(let i=0; i<2; i++){
            document.getElementById(`name-${i}`).innerText = game.players[i].name;
            document.getElementById(`chips-${i}`).innerText = game.players[i].chips;
            document.getElementById(`combo-${i}`).innerText = game.players[i].lastC;
            document.getElementById(`card-${i}`).className = (game.activeP===i)?"p-box active":"p-box";
        }
        document.getElementById('rollBtn').disabled = (game.activeP!==myIdx || game.isRolling);
        document.getElementById('stopBtn').disabled = (game.activeP!==myIdx || game.rollsDone===0 || game.phase==="TIRAGE");
    }

    function roll(){
        if(game.isRolling) return;
        game.isRolling=true; let c=0;
        let t = setInterval(()=>{
            for(let i=0;i<3;i++){
                if(game.phase==="TIRAGE"){ if(i===0) game.dice[0]=Math.floor(Math.random()*6)+1; }
                else if(!game.kept[i]) game.dice[i]=Math.floor(Math.random()*6)+1;
            }
            draw(); if(++c>12){clearInterval(t); game.isRolling=false; postRoll();}
        },50);
    }

    function postRoll(){
        const res = analyze(game.dice);
        if(res.name==="NÉNETTE"){
            let p=game.players[game.activeP], opp=game.players[1-game.activeP];
            if(game.phase==="CHARGE"){ let t=Math.min(game.pot,2); game.pot-=t; p.chips+=t; }
            else { let t=Math.min(opp.chips,2); opp.chips-=t; p.chips+=t; }
            showMsg("NÉNETTE ! +2", 1500); send({type:'MSG', txt:"NÉNETTE ! +2", dur:1500});
        }
        if(game.phase==="TIRAGE"){
            game.players[game.activeP].lastC = "Dé: "+game.dice[0];
            if(game.activeP===0) game.activeP=1;
            else {
                let d0=parseInt(game.players[0].lastC.split(': ')[1]), d1=game.dice[0];
                if(d0===d1){ game.activeP=0; game.players[0].lastC=""; game.players[1].lastC=""; }
                else { game.activeP=(d0<d1)?0:1; game.phase="CHARGE"; showMsg(game.players[game.activeP].name+" COMMENCE", 2000); }
            }
            game.dice=[0,0,0];
        } else { game.rollsDone++; if(game.rollsDone>=game.rollsMax) stop(); }
        sync();
    }

    function stop(){
        const res = analyze(game.dice);
        game.players[game.activeP].lastC = res.name;
        if(game.firstInPli===-1){
            game.firstInPli=game.activeP; game.rollsMax=game.rollsDone;
            game.activeP=1-game.activeP; game.rollsDone=0;
            game.dice=[0,0,0]; game.kept=[false,false,false];
        } else {
            showMsg("PLI FINI", 2000); // Ici on insèrerait la logique de points finale
            game.rollsMax=3; game.rollsDone=0; game.firstInPli=-1;
            game.dice=[0,0,0]; game.kept=[false,false,false];
        }
        sync();
    }

    function draw(){
        ctx.clearRect(0,0,500,200);
        game.dice.forEach((v,i)=>{
            if(v>0){
                let x=50+i*150; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.roundRect(x,50,100,100,15); ctx.fill();
                if(game.kept[i]){ ctx.strokeStyle="red"; ctx.lineWidth=5; ctx.stroke(); }
                ctx.fillStyle="#111"; const p=25, dots={1:[[2,2]],2:[[1,1],[3,3]],3:[[1,1],[2,2],[3,3]],4:[[1,1],[1,3],[3,1],[3,3]],5:[[1,1],[1,3],[2,2],[3,1],[3,3]],6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]}[v];
                dots.forEach(d=>{ctx.beginPath(); ctx.arc(x+d[0]*p, 50+d[1]*p, 8, 0, 7); ctx.fill();});
            }
        });
    }

    function showMsg(t,d){ ov.innerText=t; ov.style.display='block'; setTimeout(()=>ov.style.display='none',d); }

    document.getElementById('rollBtn').onclick = roll;
    document.getElementById('stopBtn').onclick = stop;
    canvas.onclick = (e) => {
        if(game.activeP!==myIdx || game.rollsDone===0) return;
        const r=canvas.getBoundingClientRect(); const x=(e.clientX-r.left)*(500/r.width);
        for(let i=0;i<3;i++) if(x>50+i*150 && x<150+i*150) game.kept[i]=!game.kept[i];
        draw();
    };
</script>
</body>
</html>

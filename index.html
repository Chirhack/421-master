<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>421 MASTER - App Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0b0b0b">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --panel: #161616; --accent: #e67e22; --gold: #ffca28; --wood: #3e2723; --win: #2ecc71; --loss: #e74c3c; --rembet: #9b59b6; }
        
        /* PROTECTION ANTI-RECHARGE (PULL-TO-REFRESH) */
        html, body { 
            overscroll-behavior-y: contain; 
            position: fixed; 
            overflow: hidden; 
            width: 100%; 
            height: 100%; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; /* Bloque tous les gestes de navigation du navigateur */
            user-select: none;
            background: var(--bg);
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #start-menu { background: var(--panel); padding: 30px; border-radius: 20px; border: 4px solid var(--wood); text-align: center; width: 90%; max-width: 400px; margin-top: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); z-index: 100; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; width: 85%; margin: 10px 0; text-align: center; font-size: 1.1em; }

        .game-container { display: none; background: var(--panel); padding: 20px; border-radius: 30px; border: 1px solid #333; text-align: center; position: relative; width: 92%; max-width: 700px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); margin-top: 10px; }
        
        #round-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 4px solid var(--gold); color: var(--gold); padding: 30px; border-radius: 20px; font-size: 1.6em; font-weight: bold; display: none; z-index: 200; text-align: center; width: 85%; pointer-events: none; }

        .p-area { display: flex; justify-content: space-around; margin-bottom: 15px; gap: 10px; }
        .p-box { flex: 1; padding: 10px; border-radius: 15px; border: 3px solid #333; background: #1a1a1a; transition: all 0.3s; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .active { border-color: var(--win); background: #142814; transform: translateY(-5px); box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        
        .mini-dice-container { display: flex; gap: 4px; height: 30px; align-items: center; margin-bottom: 5px; }
        .mini-die { width: 24px; height: 24px; background: white; border-radius: 4px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 2px; box-sizing: border-box; }
        .dot { background: #c0392b; border-radius: 50%; width: 4px; height: 4px; align-self: center; justify-self: center; }
        
        .combo-text { font-size: 0.8em; color: var(--gold); font-weight: bold; min-height: 1.2em; margin-bottom: 5px; }
        .p-name { font-weight: bold; font-size: 0.9em; color: #fff; max-width: 100px; overflow: hidden; }
        .p-chips { font-size: 1.6em; color: var(--gold); font-weight: 900; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        canvas { background: radial-gradient(#2d5a27, #132b12); border: 6px solid var(--wood); border-radius: 20px; max-width: 100%; height: auto; touch-action: none; }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        button { padding: 15px; font-size: 1em; cursor: pointer; background: var(--accent); border: none; color: white; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 0 #a04a00; flex: 1; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #a04a00; }
        button:disabled { opacity: 0.1; box-shadow: none; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); letter-spacing: 2px; text-shadow: 2px 2px #000; margin: 15px 0;">🎲 421 MASTER</h2>

    <div id="start-menu">
        <input type="text" id="player-name" placeholder="Ton Pseudo" maxlength="10">
        <button onclick="initOnline()" style="background:var(--rembet); box-shadow:0 4px 0 #6c3483; width:100%; margin-bottom:10px;">CRÉER SALON</button>
        <input type="text" id="join-id" placeholder="Code Adversaire">
        <button onclick="joinOnline()" style="background:var(--win); box-shadow:0 4px 0 #1e8449; width:100%">REJOINDRE</button>
        <div id="online-waiting" style="display:none; margin-top:15px;"><p>Code salon : <br><b id="my-code" style="color:var(--gold); cursor:pointer; font-size: 1.3em;" onclick="copyID()">...</b></p></div>
    </div>

    <div class="game-container" id="game-ui">
        <div id="round-overlay"></div>
        <div class="p-area">
            <div id="p0-ui" class="p-box"><div id="dice-p0" class="mini-dice-container"></div><div id="info-p0" class="combo-text"></div><div class="p-name" id="p0-label">Hôte</div><div class="p-chips" id="p0-chips">0</div></div>
            <div id="p1-ui" class="p-box"><div id="dice-p1" class="mini-dice-container"></div><div id="info-p1" class="combo-text"></div><div class="p-name" id="p1-label">Invité</div><div class="p-chips" id="p1-chips">0</div></div>
        </div>
        <div class="status-bar">
            <div>💰 POT: <span id="pot" style="color:var(--gold)">21</span></div>
            <div id="phase-label" style="color:var(--accent); font-weight:bold;">TIRAGE</div>
            <div>🎯 <span id="rolls-info">0 / 3</span></div>
        </div>
        <canvas id="gameCanvas" width="500" height="170"></canvas>
        <div class="btn-group">
            <button id="rollBtn">LANCER</button>
            <button id="stopBtn">STOP</button>
        </div>
    </div>

<script>
    // BLOQUER LA FERMETURE ACCIDENTELLE
    window.onbeforeunload = function() { return "Voulez-vous vraiment quitter la partie en cours ?"; };

    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), overlay = document.getElementById('round-overlay');
    let peer, conn, myPlayerIdx = -1, gameOver = false, isPaused = false;

    let game = {
        phase: "TIRAGE", pot: 21,
        players: [{name: "Hôte", chips: 0, comboDice: [], comboName: "", tirage: 0}, {name: "Invité", chips: 0, comboDice: [], comboName: "", tirage: 0}],
        activeP: 0, rollsDone: 0, rollsMax: 3, firstInPli: -1,
        dice: [0,0,0], kept: [false, false, false], isRolling: false
    };

    function analyze(dice) {
        if (!dice || dice[0] === 0) return { rank: -1, pts: 0, dice: [], name: "" };
        const dSort = [...dice].sort((a,b) => b-a), s = dSort.join('');
        let res = { dice: [...dice], pts: 1, rank: parseInt(s), name: dice.join('-') + " (1 PT)" };
        if (s === "421") res = { ...res, rank: 1000000, pts: 10, name: "4-2-1 (10 PTS)" };
        else if (s === "111") res = { ...res, rank: 950000, pts: 7, name: "3 AS (7 PTS)" };
        else if (dSort.filter(v => v === 1).length === 2) { 
            let a = dSort.find(v => v !== 1) || 1; 
            res = { ...res, rank: 800000 + (a*1000), pts: a, name: `DEUX AS-${a} (${a} PTS)` };
        } else if (dSort[0] === dSort[1] && dSort[1] === dSort[2]) res = { ...res, rank: 700000 + (dSort[0]*1000), pts: dSort[0], name: `BRELAN DE ${dSort[0]} (${dSort[0]} PTS)` };
        else if (s === "221") res = { ...res, rank: 0, pts: 2, name: "NÉNETTE (2 PTS)" };
        else if (["654","543","432","321"].includes(s)) res = { ...res, rank: 600000 + parseInt(s), pts: (s==="321"?1:2), name: `SUITE (${dSort.join('-')})` };
        return res;
    }

    function updateUI() {
        document.getElementById('rolls-info').innerText = `${game.rollsDone} / ${game.rollsMax}`;
        document.getElementById('pot').innerText = game.pot;
        document.getElementById('phase-label').innerText = game.phase;
        for(let i=0; i<2; i++) {
            const p = game.players[i], dCont = document.getElementById(`dice-p${i}`), iCont = document.getElementById(`info-p${i}`);
            document.getElementById(`p${i}-label`).innerText = p.name;
            document.getElementById(`p${i}-chips`).innerText = p.chips;
            document.getElementById(`p${i}-ui`).className = (game.activeP === i && !gameOver) ? "p-box active" : "p-box";
            dCont.innerHTML = ""; iCont.innerText = "";
            if (game.phase === "TIRAGE") { 
                if(p.tirage > 0) { dCont.appendChild(createMiniDie(p.tirage)); iCont.innerText = "DÉ : " + p.tirage; }
            } else {
                let isMe = (i === game.activeP && !isPaused && !game.isRolling);
                let curD = isMe ? game.dice : (p.comboDice || []);
                let curN = isMe ? (game.dice[0] !== 0 ? analyze(game.dice).name : "") : (p.comboName || "");
                if (curD && curD[0] !== 0) { curD.forEach(v => dCont.appendChild(createMiniDie(v))); iCont.innerText = curN; }
            }
        }
        const myTurn = (game.activeP === myPlayerIdx && !gameOver && !isPaused && !game.isRolling);
        document.getElementById('rollBtn').disabled = !myTurn;
        document.getElementById('stopBtn').disabled = !myTurn || game.rollsDone === 0 || game.phase === "TIRAGE";
    }

    function draw() {
        ctx.clearRect(0,0,500,170);
        if (game.phase === "TIRAGE") { if (game.dice[0] > 0) drawDie(205, 40, 90, game.dice[0], false); }
        else { for(let i=0; i<3; i++) if(game.dice[i] > 0) drawDie(30 + i * 155, 40, 85, game.dice[i], game.kept[i]); }
    }

    function createMiniDie(val) {
        const die = document.createElement('div'); die.className = 'mini-die';
        const dots = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
        for(let i=0; i<9; i++) { const dot = document.createElement('div'); if(dots[val] && dots[val].includes(i)) dot.className = 'dot'; die.appendChild(dot); }
        return die;
    }

    function drawDie(x, y, size, val, isKept) {
        ctx.fillStyle = isKept ? "#333" : "#fff"; ctx.beginPath(); ctx.roundRect(x,y,size,size,15); ctx.fill();
        if(isKept) { ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5; ctx.stroke(); }
        ctx.fillStyle = isKept ? "#2ecc71" : "#c0392b";
        const p = size/4, ptsMap = {1:[[2,2]], 2:[[1,1],[3,3]], 3:[[1,1],[2,2],[3,3]], 4:[[1,1],[1,3],[3,1],[3,3]], 5:[[1,1],[1,3],[2,2],[3,1],[3,3]], 6:[[1,1],[1,2],[1,3],[3,1],[3,2],[3,3]]};
        if(ptsMap[val]) ptsMap[val].forEach(pt => { ctx.beginPath(); ctx.arc(x+pt[0]*p, y+pt[1]*p, 7, 0, Math.PI*2); ctx.fill(); });
    }

    function roll() {
        if(gameOver || game.isRolling || isPaused || game.activeP !== myPlayerIdx) return;
        let final = (game.phase === "TIRAGE") ? [Math.floor(Math.random()*6)+1] : [0,0,0];
        if (game.phase !== "TIRAGE") { for(let i=0; i<3; i++) final[i] = (!game.kept[i] || game.dice[0] === 0) ? Math.floor(Math.random()*6)+1 : game.dice[i]; }
        sendData({type:'ANIM', kept: [...game.kept], final: final}); runAnim(final);
    }

    function runAnim(finalValues) {
        game.isRolling = true; updateUI();
        let count = 0;
        let anim = setInterval(() => {
            if(game.phase === "TIRAGE") game.dice = [Math.floor(Math.random()*6)+1];
            else { for(let i=0; i<3; i++) if(!game.kept[i]) game.dice[i] = Math.floor(Math.random()*6)+1; }
            draw();
            if(++count > 12) { clearInterval(anim); game.dice = finalValues; game.isRolling = false; if(game.activeP === myPlayerIdx) handleRollResult(); updateUI(); draw(); }
        }, 50);
    }

    function handleRollResult() {
        if(game.phase === "TIRAGE") {
            game.players[game.activeP].tirage = game.dice[0]; game.dice = [0,0,0]; 
            if(game.players[0].tirage > 0 && game.players[1].tirage > 0) {
                isPaused = true; 
                const msgTirage = `${game.players[0].name}: ${game.players[0].tirage} ⚔️ ${game.players[1].name}: ${game.players[1].tirage}`;
                sendData({type:'OVERLAY', msg: msgTirage, duration: 3000}); showOverlay(msgTirage, 3000);
                setTimeout(() => {
                    if(game.players[0].tirage === game.players[1].tirage) { game.players[0].tirage = 0; game.players[1].tirage = 0; game.activeP = 0; sendData({type:'OVERLAY', msg: "ÉGALITÉ !", duration: 2000}); showOverlay("ÉGALITÉ !", 2000); }
                    else { game.activeP = (game.players[0].tirage < game.players[1].tirage) ? 0 : 1; game.phase = "CHARGE"; const startMsg = `${game.players[game.activeP].name} COMMENCE !`; sendData({type:'OVERLAY', msg: startMsg, duration: 3000}); showOverlay(startMsg, 3000); }
                    isPaused = false; finishTurn();
                }, 3000);
            } else { game.activeP = (game.activeP === 0) ? 1 : 0; finishTurn(); }
        } else { game.rollsDone++; if(game.rollsDone === game.rollsMax) stop(); else finishTurn(); }
    }

    function stop() {
        if(isPaused || game.isRolling || game.activeP !== myPlayerIdx || game.dice[0] === 0) return;
        const res = analyze(game.dice); 
        game.players[game.activeP].comboDice = [...res.dice]; game.players[game.activeP].comboName = res.name;
        if(game.firstInPli === -1) { 
            game.firstInPli = game.activeP; game.rollsMax = game.rollsDone; 
            game.activeP = (game.activeP === 0) ? 1 : 0; 
            game.rollsDone = 0; game.dice = [0, 0, 0]; game.kept = [false, false, false];
        } else resolvePli();
        finishTurn();
    }

    function resolvePli() {
        isPaused = true; const p0 = analyze(game.players[0].comboDice), p1 = analyze(game.players[1].comboDice);
        let winMsg = "";
        if(p0.rank === p1.rank) { winMsg = "⚖️ REMBET !"; game.activeP = game.firstInPli; }
        else {
            let wIdx = (p0.rank > p1.rank) ? 0 : 1, lIdx = wIdx === 0 ? 1 : 0;
            let pts = (wIdx === 0 ? p0.pts : p1.pts);
            if(game.phase === "CHARGE") { let t = Math.min(game.pot, pts); game.players[lIdx].chips += t; game.pot -= t; winMsg = `${game.players[lIdx].name} PREND ${t}`; if(game.pot <= 0) game.phase = "DECHARGE"; }
            else { let t = Math.min(game.players[wIdx].chips, pts); game.players[wIdx].chips -= t; game.players[lIdx].chips += t; winMsg = `${game.players[wIdx].name} DONNE ${t}`; }
            game.activeP = lIdx;
        }
        sendData({type:'OVERLAY', msg: winMsg, duration: 3000}); showOverlay(winMsg, 3000);
        setTimeout(() => {
            isPaused = false;
            if(game.phase === "DECHARGE" && (game.players[0].chips === 0 || game.players[1].chips === 0)) { gameOver = true; showOverlay("PARTIE TERMINÉE !"); }
            else { game.firstInPli = -1; game.rollsMax = 3; game.rollsDone = 0; game.dice = [0, 0, 0]; game.kept = [false, false, false]; game.players[0].comboDice = []; game.players[1].comboDice = []; game.players[0].comboName = ""; game.players[1].comboName = ""; }
            finishTurn();
        }, 3000);
    }

    function initOnline() { 
        game.players[0].name = document.getElementById('player-name').value || "Joueur 1";
        peer = new Peer('421-' + Math.floor(Math.random()*9999));
        peer.on('open', id => { document.getElementById('my-code').innerText = id; document.getElementById('online-waiting').style.display = 'block'; });
        peer.on('connection', c => { conn = c; myPlayerIdx = 0; setupSync(); });
    }
    function joinOnline() {
        let tid = document.getElementById('join-id').value; 
        game.players[1].name = document.getElementById('player-name').value || "Joueur 2";
        peer = new Peer(); peer.on('open', () => { conn = peer.connect(tid); myPlayerIdx = 1; setupSync(); });
    }
    function setupSync() {
        conn.on('open', () => { sendData({type:'HELLO', name: game.players[myPlayerIdx].name}); document.getElementById('start-menu').style.display='none'; document.getElementById('game-ui').style.display='block'; updateUI(); draw(); });
        conn.on('data', d => {
            if(d.type === 'HELLO') { game.players[myPlayerIdx===0?1:0].name = d.name; updateUI(); }
            if(d.type === 'SYNC') { game = d.game; updateUI(); draw(); }
            if(d.type === 'ANIM') { game.kept = d.kept; runAnim(d.final); }
            if(d.type === 'OVERLAY') showOverlay(d.msg, d.duration);
        });
    }
    function sendData(d) { if(conn && conn.open) conn.send(d); }
    function finishTurn() { sendData({type:'SYNC', game:game}); updateUI(); draw(); }
    function copyID() { navigator.clipboard.writeText(document.getElementById('my-code').innerText); alert("Copié !"); }
    function showOverlay(txt, dur) { overlay.innerText = txt; overlay.style.display = 'block'; setTimeout(() => overlay.style.display = 'none', dur); }
    
    document.getElementById('rollBtn').addEventListener('click', roll);
    document.getElementById('stopBtn').addEventListener('click', stop);
    canvas.addEventListener('pointerdown', e => {
        if(game.isRolling || game.phase === "TIRAGE" || game.rollsDone === 0 || game.activeP !== myPlayerIdx) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (500 / r.width);
        for(let i=0; i<3; i++) if(x > 30+i*155 && x < 115+i*155) game.kept[i] = !game.kept[i];
        updateUI(); draw();
    });
</script>
</body>
</html>
